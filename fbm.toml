[common]
data_dir = "./data"
artifacts_dir = "./artifacts"
system = "zar"
version = "production"

[models.ensemble.params]
fallback = "steamer"

[models.ensemble.params.components]
steamer = 1.0
"statcast-gbm-preseason" = 1.0

[models.ensemble.params.route_groups]
league_required = "steamer"
batting_rate = "statcast-gbm-preseason"
pitching_rate = "statcast-gbm-preseason"

[models.ensemble.params.routes]
g = "steamer"
gs = "steamer"

[models.ensemble.params.versions]
"statcast-gbm-preseason" = "latest"

[models.ensemble.params.rate_calibration]
era_intercept = 0.6805
era_slope = 0.7890
era_prior_coef = 0.0252
whip_intercept = 0.2674
whip_slope = 0.7543
whip_prior_coef = 0.0050

# --- Sample routed ensemble configs ---

# (a) Rate stats from statcast-gbm, all counting from steamer (explicit)
# [models.ensemble.params.route_groups]
# batting_rate = "statcast-gbm"
# pitching_rate = "statcast-gbm"
# batting_counting = "steamer"
# pitching_counting = "steamer"

# (b) Weighted-average mode (legacy)
# [models.ensemble.params]
# mode = "weighted_average"
# season = 2025
# stats = ["avg", "obp", "slg", "era", "fip", "whip", "k_per_9", "bb_per_9"]
# [models.ensemble.params.components]
# marcel = 0.6
# "statcast-gbm" = 0.4

[models.statcast-gbm.params.pitcher]
learning_rate = 0.05
max_iter = 100
max_leaf_nodes = 15
min_samples_leaf = 50

[models.statcast-gbm-preseason.params.batter]
sample_weight_transform = "clamp_100_400"

[models.statcast-gbm-preseason.params.pitcher]
sample_weight_transform = "sqrt"
learning_rate = 0.05
max_depth = 3
max_iter = 100
max_leaf_nodes = 15
min_samples_leaf = 20

[models.composite-mle.params]
engine = "gbm"
feature_groups = ["age", "projected_batting_pt", "projected_pitching_pt", "batting_counting_lags", "pitching_counting_lags", "mle_batter_rates"]

[models.composite-statcast.params]
engine = "gbm"
feature_groups = ["age", "projected_batting_pt", "projected_pitching_pt", "batting_counting_lags", "pitching_counting_lags", "statcast_gbm_preseason_batter_rates", "statcast_gbm_preseason_pitcher_rates"]

[models.composite-full.params]
engine = "gbm"
feature_groups = ["age", "projected_batting_pt", "projected_pitching_pt", "batting_counting_lags", "pitching_counting_lags", "statcast_gbm_preseason_batter_rates", "statcast_gbm_preseason_pitcher_rates"]
batter_sample_weight_column = "proj_pa"
pitcher_sample_weight_column = "proj_ip"

[models.composite-full.params.batter]
sample_weight_transform = "sqrt"
learning_rate = 0.05
max_depth = 3
max_iter = 100
max_leaf_nodes = 15
min_samples_leaf = 50

[models.composite-full.params.pitcher]
sample_weight_transform = "sqrt"
learning_rate = 0.01
max_depth = 3
max_iter = 200
max_leaf_nodes = 15
min_samples_leaf = 5

# --- Web UI configuration ---
# Controls which projection/valuation system+version pairs the web UI displays.
# When empty (or omitted), all available data is shown.

[[web.projections]]
system = "steamer"
version = "2026"

[[web.valuations]]
system = "zar"
version = "production"

# --- League configurations ---

[leagues.keeper]
format = "h2h_categories"
teams = 12
budget = 260
roster_batters = 9
roster_pitchers = 8
roster_util = 1
roster_bench = 8

[leagues.keeper.positions]
c = 1
"1b" = 1
"2b" = 1
"3b" = 1
ss = 1
of = 3

[leagues.keeper.pitcher_positions]
sp = 2
rp = 2
p = 4

[leagues.keeper.eligibility]
batter_min_games = 5
sp_min_starts = 3
rp_min_relief = 5
carryover_seasons = 1
min_pa = 200
min_ip = 30

[[leagues.keeper.batting_categories]]
key = "hr"
name = "Home Runs"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.batting_categories]]
key = "r"
name = "Runs"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.batting_categories]]
key = "rbi"
name = "RBI"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.batting_categories]]
key = "obp"
name = "On-Base Percentage"
stat_type = "rate"
direction = "higher"
numerator = "h+bb+hbp"
denominator = "pa"

[[leagues.keeper.batting_categories]]
key = "sb"
name = "Stolen Bases"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.pitching_categories]]
key = "era"
name = "ERA"
stat_type = "rate"
direction = "lower"
numerator = "er"
denominator = "ip"

[[leagues.keeper.pitching_categories]]
key = "whip"
name = "WHIP"
stat_type = "rate"
direction = "lower"
numerator = "bb+h"
denominator = "ip"

[[leagues.keeper.pitching_categories]]
key = "so"
name = "Strikeouts"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.pitching_categories]]
key = "w"
name = "Wins"
stat_type = "counting"
direction = "higher"

[[leagues.keeper.pitching_categories]]
key = "sv+hld"
name = "Net Saves + Holds"
stat_type = "counting"
direction = "higher"

