repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff-format
      - id: ruff-check
        args: [--fix]
  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: uv run ty check src tests
        language: system
        pass_filenames: false
        types: [python]
      - id: pytest
        name: pytest
        entry: uv run pytest --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
      - id: biome-check
        name: biome check
        entry: bash -c 'cd frontend && bunx biome check src'
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
        files: ^frontend/
      - id: tsc-check
        name: tsc type check
        entry: bash -c 'cd frontend && bunx tsc -b'
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
        files: ^frontend/
      - id: vitest
        name: vitest
        entry: bash -c 'cd frontend && bun run test'
        language: system
        pass_filenames: false
        types_or: [ts, tsx]
        files: ^frontend/
